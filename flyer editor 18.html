<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Flyer Editor - Pure Native Engine (Zero Dependencies)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* CSS Reset & Vanilla Premium UI Theme */
       :root{--primary:#41439c;--primary-hover:#4f46e5;--bg-dark:#0f172a;--bg-panel:#1e293b;--bg-canvas:#e2e8f0;--text-main:#f8fafc;--text-muted:#94a3b8;--border:#334155;--toolbar-h:60px;--panel-width:320px}body,html{margin:0;padding:0;width:100%;height:100vh;font-family:'Inter',system-ui,sans-serif;background:var(--bg-dark);color:var(--text-main);overflow:hidden;display:flex;flex-direction:column}.toolbar{height:var(--toolbar-h);background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 15px;z-index:10}.toolbar-group{display:flex;gap:8px;align-items:center}.toolbar-group:not(:last-child){border-right:1px solid var(--border);padding-right:15px}button{background:#fff0;border:1px solid var(--border);color:var(--text-main);padding:8px 12px;border-radius:6px;cursor:pointer;transition:all 0.2s;font-size:13px;font-weight:500}button:hover{background:rgb(255 255 255 / .05)}button.primary{background:var(--primary);border-color:var(--primary);color:#ffffff}button.primary:hover{background:var(--primary-hover)}button:disabled{opacity:.4;cursor:not-allowed}button.active{background:var(--primary-hover);border-color:var(--primary-hover);color:#fff}.btn-danger{color:#f87171;border-color:#f87171}.btn-danger:hover{background:rgb(248 113 113 / .1)}span.zoom-level{font-size:13px;color:var(--text-muted);width:45px;text-align:center}.main-editor{display:flex;flex:1;height:calc(100vh - var(--toolbar-h))}.canvas-wrapper{flex:1;background:var(--bg-canvas);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}#canvas-scale{transition:transform 0.05s linear;transform-origin:center}#flyer-canvas{position:relative;overflow:hidden;box-shadow:0 10px 40px rgb(0 0 0 / .25);background:#fff;transform-origin:top left}.canvas-element{position:absolute;transform-origin:center;box-sizing:border-box;cursor:move}#selection-overlay{position:absolute;border:1.5px solid var(--primary-hover);pointer-events:none;z-index:99999;display:none}.handle,.rotate-handle{position:absolute;width:10px;height:10px;background:#fff;border:1.5px solid var(--primary-hover);border-radius:50%;pointer-events:auto;z-index:10}.handle[data-dir="nw"]{cursor:nwse-resize;top:-6px;left:-6px}.handle[data-dir="n"]{cursor:ns-resize;top:-6px;left:calc(50% - 6px)}.handle[data-dir="ne"]{cursor:nesw-resize;top:-6px;right:-6px}.handle[data-dir="e"]{cursor:ew-resize;top:calc(50% - 6px);right:-6px}.handle[data-dir="se"]{cursor:nwse-resize;bottom:-6px;right:-6px}.handle[data-dir="s"]{cursor:ns-resize;bottom:-6px;left:calc(50% - 6px)}.handle[data-dir="sw"]{cursor:nesw-resize;bottom:-6px;left:-6px}.handle[data-dir="w"]{cursor:ew-resize;top:calc(50% - 6px);left:-6px}.rotate-handle{cursor:crosshair;background:var(--primary-hover);top:-35px;left:calc(50% - 6px)}.rotate-line{position:absolute;width:1.5px;height:29px;background:var(--primary-hover);top:-29px;left:calc(50% - 0.75px);pointer-events:none}.properties-panel{width:var(--panel-width);background:var(--bg-panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}.panel-section{padding:15px 20px;border-bottom:1px solid var(--border);display:none}.panel-section.visible{display:block}.panel-section h3{margin:0 0 15px 0;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)}.control-group{margin-bottom:12px}.control-row{display:flex;gap:10px;align-items:center}.control-row>div{flex:1}label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px}input[type="number"],input[type="text"],select{width:100%;background:var(--bg-dark);border:1px solid var(--border);color:var(--text-main);padding:8px;border-radius:4px;box-sizing:border-box;font-size:13px;outline:none;transition:border-color 0.2s}input[type="color"]{width:100%;height:32px;padding:2px;background:var(--bg-dark);border:1px solid var(--border);border-radius:4px;cursor:pointer}input[type="range"]{width:100%;cursor:pointer}input[type="checkbox"]{accent-color:var(--primary)}.empty-state{padding:50px 20px;text-align:center;color:var(--text-muted);font-size:14px;display:block}.btn-group{display:flex;gap:5px}.btn-group button{flex:1;padding:6px}.modal-overlay{position:fixed;inset:0;background:rgb(0 0 0 / .7);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px)}.modal-content{background:var(--bg-panel);width:600px;max-width:90%;border-radius:8px;box-shadow:0 20px 25px -5px rgb(0 0 0 / .5);border:1px solid var(--border)}.modal-header{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.modal-header h2{margin:0;font-size:16px}.modal-body{padding:20px}.modal-footer{padding:15px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:rgb(0 0 0 / .2)}textarea.code-input{width:100%;height:250px;background:var(--bg-dark);color:#a5b4fc;border:1px solid var(--border);padding:10px;font-family:monospace;border-radius:4px;resize:none;box-sizing:border-box;font-size:13px;outline:none}#selection-overlay[data-selected-type="text"] .handle[data-dir="n"],#selection-overlay[data-selected-type="text"] .handle[data-dir="s"]{display:none!important}#selection-overlay[data-selected-type="image"] .handle,#selection-overlay[data-selected-type="shape"] .handle{display:block}.canvas-element{position:absolute;transform-origin:center;box-sizing:border-box;cursor:move;outline:none;user-select:none}@media print{.toolbar,.properties-panel,.modal-overlay,#selection-overlay{display:none!important}body,html{margin:0;padding:0;background:#fff0;overflow:visible;width:100%;height:100%}.main-editor{display:block;height:auto}.canvas-wrapper{display:block;background:#fff0;overflow:visible;align-items:flex-start;justify-content:flex-start}#canvas-scale,#canvas-pan{transform:none!important}#flyer-canvas{box-shadow:none;margin:0;transform:none!important;background-image:none!important}@page{margin:0}}
    </style>
</head>

<body>

    <div class="toolbar">
        <div class="toolbar-group">
            <button class="primary" onclick="showModal('modal-html')">Load Flyer HTML</button>
            <button onclick="document.getElementById('import-file-input').click()">Import .HTML</button>
            <input type="file" id="import-file-input" accept=".html,.htm" style="display:none"
                onchange="importHtmlFile(this)">
        </div>
        <div class="toolbar-group">
            <button onclick="addText()">+ Text</button>
            <button onclick="document.getElementById('add-image-input').click()">+ Image</button>
            <input type="file" id="add-image-input" accept="image/*" style="display:none" onchange="addImageFile(this)">
            <button id="btn-grid" onclick="toggleGrid()">Grid</button>
        </div>
        <div class="toolbar-group">
            <button id="btn-undo" onclick="undo()" disabled title="Undo (Ctrl+Z)">↶</button>
            <button id="btn-redo" onclick="redo()" disabled title="Redo (Ctrl+Y)">↷</button>
        </div>
        <div class="toolbar-group">
            <button onclick="zoomOut()">-</button>
            <span class="zoom-level" id="zoom-text">100%</span>
            <button onclick="zoomIn()">+</button>
            <button onclick="resetZoomPan()">Fit</button>
        </div>
        <div class="toolbar-group" style="padding-right:0; border:none;">
            <button onclick="exportToImage('png')">PNG Output</button>
            <button onclick="exportToImage('jpeg')">JPG Output</button>
            <button class="primary" onclick="exportToPDF()">Download PDF</button>
        </div>
    </div>

    <div class="main-editor">
        <div class="canvas-wrapper" id="canvas-wrapper">
            <div id="canvas-scale">
                <div id="canvas-pan">
                    <div id="flyer-canvas">
                        <div id="selection-overlay">
                            <div class="handle" data-dir="nw"></div>
                            <div class="handle" data-dir="n"></div>
                            <div class="handle" data-dir="ne"></div>
                            <div class="handle" data-dir="e"></div>
                            <div class="handle" data-dir="se"></div>
                            <div class="handle" data-dir="s"></div>
                            <div class="handle" data-dir="sw"></div>
                            <div class="handle" data-dir="w"></div>
                            <div class="rotate-line"></div>
                            <div class="rotate-handle"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="properties-panel" id="properties-panel">
            <div class="empty-state" id="panel-empty">No element selected.<br><br>Click an element on the canvas to
                edit.</div>

            <div class="panel-section" id="panel-common">
                <h3>Transform & Layout</h3>
                <div class="control-group control-row">
                    <div><label>X</label><input type="number" id="prop-x" step="1"></div>
                    <div><label>Y</label><input type="number" id="prop-y" step="1"></div>
                </div>
                <div class="control-group control-row">
                    <div><label>Width</label><input type="number" id="prop-w" min="10" step="1"></div>
                    <div><label>Height</label><input type="number" id="prop-h" min="10" step="1"></div>
                </div>
                <div class="control-group control-row">
                    <div><label>Rotation (°)</label><input type="number" id="prop-angle" step="1"></div>
                    <div style="display:flex; align-items:center; padding-top:15px;">
                        <input type="checkbox" id="prop-lock" style="margin-right:5px; margin-top:0;"> <label>Lock
                            Aspect</label>
                    </div>
                </div>
                <div class="control-group">
                    <label>Opacity</label>
                    <input type="range" id="prop-opacity" min="0" max="1" step="0.05">
                </div>
                <div class="control-group control-row" style="margin-top:20px;">
                    <button onclick="bringForward()">↑ Fwd</button>
                    <button onclick="sendBackward()">↓ Back</button>
                    <button onclick="bringToFront()">⇈ Top</button>
                    <button onclick="sendToBack()">⇊ Bot</button>
                </div>
                <div class="control-group control-row">
                    <button onclick="duplicateSelected()">Duplicate</button>
                    <button class="btn-danger" onclick="deleteSelected()">Delete</button>
                </div>
            </div>

            <div class="panel-section" id="panel-text">
                <h3>Text Properties</h3>
                <div class="control-group control-row">
                    <div><label>Font Size</label><input type="number" id="prop-fontsize" min="8" step="1"></div>
                    <div><label>Text Colour</label><input type="color" id="prop-fontcolor"></div>
                </div>
                <div class="control-group btn-group" style="margin-bottom:15px;">
                    <button id="btn-bold" onclick="toggleBoolProp('bold')"><b>B</b></button>
                    <button id="btn-italic" onclick="toggleBoolProp('italic')"><i>I</i></button>
                    <button id="btn-underline" onclick="toggleBoolProp('underline')"><u>U</u></button>
                </div>
                <div class="control-group">
                    <label>Alignment</label>
                    <select id="prop-align" onchange="setProp('textAlign', this.value)">
                        <option value="left">Left</option>
                        <option value="center">Center</option>
                        <option value="right">Right</option>
                    </select>
                </div>
                <div class="control-group control-row">
                    <div><label>Line Height</label><input type="number" id="prop-lineheight" step="0.1" min="0.5"></div>
                    <div><label>Letter Spacing</label><input type="number" id="prop-charspacing" step="1"></div>
                </div>
                <div class="control-group control-row">
                    <div><label>Background</label><input type="color" id="prop-textbg"></div>
                    <div><label>Radius</label><input type="number" id="prop-textrx" min="0"></div>
                </div>
            </div>

            <div class="panel-section" id="panel-image">
                <h3>Image Adjustments</h3>
                <div class="control-group">
                    <button onclick="document.getElementById('replace-img-input').click()"
                        style="width:100%; margin-bottom:15px;">Replace Image...</button>
                    <input type="file" id="replace-img-input" accept="image/*" style="display:none"
                        onchange="replaceImageFile(this)">
                </div>
                <div class="control-group">
                    <label>Border Radius</label><input type="number" id="prop-imageradius" min="0">
                </div>
                <h3 style="margin-top:20px;">Filters</h3>
                <div class="control-group"><label>Brightness</label><input type="range" id="prop-brightness" min="-0.5"
                        max="0.5" step="0.02"></div>
                <div class="control-group"><label>Contrast</label><input type="range" id="prop-contrast" min="-0.5"
                        max="0.5" step="0.02"></div>
                <div class="control-group"><label>Saturation</label><input type="range" id="prop-saturation" min="-1"
                        max="1" step="0.05"></div>
                <div class="control-group"><label>Blur</label><input type="range" id="prop-blur" min="0" max="20"
                        step="0.5"></div>
            </div>

            <div class="panel-section" id="panel-svg">
                <h3>Inline SVG</h3>
                <div class="control-group">
                    <button onclick="showModal('modal-svg')" style="width:100%; margin-bottom:15px;">Edit Raw SVG
                        Code</button>
                </div>
                <div class="control-group control-row">
                    <div><label>Fill</label><input type="color" id="prop-svgfill"></div>
                    <div><label>Stroke</label><input type="color" id="prop-svgstroke"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal-html">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Load Raw HTML Flyer</h2><button onclick="hideModal('modal-html')"
                    style="border:none; font-size:16px;">×</button>
            </div>
            <div class="modal-body">
                <textarea id="html-markup-input" class="code-input"
                    placeholder="<div style='width:800px; height:600px; background:#fff;'>...</div>"></textarea>
            </div>
            <div class="modal-footer"><button onclick="hideModal('modal-html')">Cancel</button><button class="primary"
                    onclick="loadHtmlFromMarkup()">Render to Canvas</button></div>
        </div>
    </div>
    <div class="modal-overlay" id="modal-svg">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit SVG</h2><button onclick="hideModal('modal-svg')"
                    style="border:none; font-size:16px;">×</button>
            </div>
            <div class="modal-body"><textarea id="svg-raw-input" class="code-input" spellcheck="false"></textarea></div>
            <div class="modal-footer"><button onclick="hideModal('modal-svg')">Cancel</button><button class="primary"
                    onclick="applyRawSvg()">Update SVG</button></div>
        </div>
    </div>

    <script>
       // State Management
        const state = {
            elements: [],
            selectedId: null,
            editingId: null,
            history: [],
            historyIdx: -1,
            zoom: 1, panX: 0, panY: 0,
            canvasW: 800, canvasH: 600,
            bgColor: '#ffffff', grid: false
        };

        const canvasEl = document.getElementById('flyer-canvas');
        const selectionOverlay = document.getElementById('selection-overlay');
        const d_scale = document.getElementById('canvas-scale');
        const d_pan = document.getElementById('canvas-pan');
        let clipboard = null;

        // Custom Pure JS Sanitizer
        const DOMSanitizer = {
            sanitize: function (htmlStr) {
                const doc = new DOMParser().parseFromString(htmlStr, 'text/html');
                const scripts = doc.querySelectorAll('script');
                scripts.forEach(s => s.remove());
                const all = doc.querySelectorAll('*');
                for (let i = 0; i < all.length; i++) {
                    const node = all[i];
                    for (let j = node.attributes.length - 1; j >= 0; j--) {
                        const attr = node.attributes[j];
                        if (attr.name.toLowerCase().startsWith('on') || attr.value.toLowerCase().includes('javascript:')) {
                            node.removeAttribute(attr.name);
                        }
                    }
                }
                return doc.body.innerHTML;
            }
        };

        // --- History ---
        function saveHistory() {
            if (state.historyIdx < state.history.length - 1) state.history = state.history.slice(0, state.historyIdx + 1);
            state.history.push(JSON.stringify({ el: state.elements, bg: state.bgColor, w: state.canvasW, h: state.canvasH }));
            if (state.history.length > 50) state.history.shift();
            else state.historyIdx++;
            updateHistoryBtns();
        }
        function undo() {
            if (state.historyIdx > 0) {
                state.historyIdx--;
                restoreState(JSON.parse(state.history[state.historyIdx]));
            }
        }
        function redo() {
            if (state.historyIdx < state.history.length - 1) {
                state.historyIdx++;
                restoreState(JSON.parse(state.history[state.historyIdx]));
            }
        }
        function restoreState(s) {
            state.elements = s.el; state.bgColor = s.bg; state.canvasW = s.w; state.canvasH = s.h;
            renderCanvas(); updatePanel(); updateHistoryBtns();
        }
        function updateHistoryBtns() {
            document.getElementById('btn-undo').disabled = (state.historyIdx <= 0);
            document.getElementById('btn-redo').disabled = (state.historyIdx >= state.history.length - 1);
        }
        saveHistory(); // Init empty

        // --- Core Rendering Engine ---
        function renderCanvas() {
            canvasEl.style.width = state.canvasW + 'px'; canvasEl.style.height = state.canvasH + 'px';
            canvasEl.style.backgroundColor = state.bgColor;
            canvasEl.style.backgroundImage = state.grid ? 'radial-gradient(#ccc 1px, transparent 1px)' : 'none';
            canvasEl.style.backgroundSize = state.grid ? '20px 20px' : 'auto';

            state.elements.forEach(el => {
                let node = document.getElementById('el-' + el.id);
                if (!node) {
                    node = document.createElement('div');
                    node.id = 'el-' + el.id; node.className = 'canvas-element';
                    if (el.type === 'text') node.addEventListener('dblclick', (e) => enterTextEditMode(el.id,e));
                    canvasEl.appendChild(node);
                }
                node.style.left = el.x + 'px'; node.style.top = el.y + 'px';
                node.style.width = el.w + 'px'; node.style.height = el.h + 'px';
                node.style.transform = `rotate(${el.angle}deg)`;
                node.style.opacity = el.opacity; node.style.zIndex = el.zIndex;

                if (el.type === 'text') {
                    if (state.editingId !== el.id) {
                        node.innerHTML = el.content;
                    }
                    node.style.fontSize = el.fontSize + 'px'; node.style.fontFamily = el.fontFamily;
                    node.style.color = el.color; node.style.fontWeight = el.bold ? 'bold' : 'normal';
                    node.style.fontStyle = el.italic ? 'italic' : 'normal';
                    node.style.textDecoration = el.underline ? 'underline' : 'none';
                    node.style.textAlign = el.textAlign; node.style.lineHeight = el.lineHeight;
                    node.style.letterSpacing = el.letterSpacing + 'px'; node.style.backgroundColor = el.bgColor;
                    node.style.borderRadius = el.radius + 'px'; node.style.textTransform = el.textTransform || 'none';
                    node.style.display = 'block'; 
                    node.style.whiteSpace = 'pre-wrap'; // Allows wrapping on spaces
                    node.style.wordBreak = 'break-word'; 

                    node.style.width = el.w + 'px';
                    node.style.height = 'auto';
                    // NEW: Apply Shadows and Transforms (like skew)
                    if (el.textShadow && el.textShadow !== 'none') node.style.textShadow = el.textShadow;
                    if (el.transformMatrix && el.transformMatrix !== 'none') {
                        node.style.transform = `rotate(${el.angle}deg) ${el.transformMatrix}`;
                    }
                    if (el.fontFamily.includes('Material Symbols')) {
                        node.style.fontVariationSettings = "'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24";
                    }
                    requestAnimationFrame(() => {
                        const actualHeight = node.scrollHeight;
                        if (Math.abs(el.h - actualHeight) > 1) {
                            el.h = actualHeight;
                            // Update overlay without a full re-render loop
                            if (state.selectedId === el.id) {
                                selectionOverlay.style.height = actualHeight + 'px';
                            }
                        }
                    });
                } else if (el.type === 'image') {
                    node.innerHTML = `<img src="${el.content}" draggable="false" style="width:100%; height:100%; display:block; object-fit:fill; border-radius:${el.radius}px; filter: brightness(${1 + el.filters.b}) contrast(${1 + el.filters.c}) saturate(${1 + el.filters.s}) blur(${el.filters.bl}px); box-shadow: ${el.shadow.x}px ${el.shadow.y}px ${el.shadow.bl}px ${el.shadow.c}; pointer-events:none;"/>`;
                } else if (el.type === 'svg') {
                    node.innerHTML = DOMSanitizer.sanitize(el.content);
                    const svg = node.querySelector('svg');
                    if (svg) {
                        svg.style.width = '100%'; svg.style.height = '100%'; svg.style.display = 'block';
                        if (el.fill) svg.style.fill = el.fill; if (el.stroke) svg.style.stroke = el.stroke;
                        if (el.strokeWidth) svg.style.strokeWidth = el.strokeWidth + 'px';
                    }
                } else if (el.type === 'shape') {
                    // NEW: Handles gradients, transparent boxes, and borders
                    node.style.backgroundColor = el.bgColor;
                    node.style.backgroundImage = el.bgImage;
                    node.style.border = el.border;
                    node.style.borderRadius = el.radius + 'px';
                    if (el.backdropFilter && el.backdropFilter !== 'none') {
                        node.style.backdropFilter = el.backdropFilter;
                        node.style.webkitBackdropFilter = el.backdropFilter; // Safari support
                    }
                    if (el.transformMatrix && el.transformMatrix !== 'none') {
                        node.style.transform = `rotate(${el.angle}deg) ${el.transformMatrix}`;
                    }
                }    
            });

            Array.from(canvasEl.getElementsByClassName('canvas-element')).forEach(node => {
                if (!state.elements.find(e => 'el-' + e.id === node.id)) node.remove();
            });

            const selEl = getSelectedElement();
            if (selEl) {
                selectionOverlay.style.display = 'block'; selectionOverlay.style.zIndex = Math.max(...state.elements.map(e => e.zIndex)) + 10;
                selectionOverlay.style.left = selEl.x + 'px'; selectionOverlay.style.top = selEl.y + 'px';
                selectionOverlay.style.width = selEl.w + 'px'; selectionOverlay.style.height = selEl.h + 'px';
                selectionOverlay.style.transform = `rotate(${selEl.angle}deg)`;
                selectionOverlay.setAttribute('data-selected-type', selEl.type);
            } else { selectionOverlay.style.display = 'none';selectionOverlay.removeAttribute('data-selected-type'); }
        }

        function getSelectedElement() { return state.elements.find(e => e.id === state.selectedId); }
        function selectElement(id) { state.selectedId = id; renderCanvas(); updatePanel(); }

        // --- Interaction Logic (Pan, Zoom, Drag, Resize, Rotate) ---
        let dragMode = null; let dragStartX = 0, dragStartY = 0, dragStartObj = null;

        document.getElementById('canvas-wrapper').addEventListener('wheel', e => {
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                state.zoom = Math.max(0.1, Math.min(5, state.zoom + (e.deltaY > 0 ? -0.1 : 0.1)));
                d_scale.style.transform = `scale(${state.zoom})`;
                document.getElementById('zoom-text').innerText = Math.round(state.zoom * 100) + '%';
            } else {
                state.panX -= e.deltaX; state.panY -= e.deltaY;
                d_pan.style.transform = `translate(${state.panX}px, ${state.panY}px)`;
            }
        });

        
        let lastClickTime = 0;

        document.getElementById('canvas-wrapper').addEventListener('mousedown', e => {
            // If we click inside an actively editing text box, let the browser handle typing naturally
            const elNode = e.target.closest('.canvas-element');
            if (elNode && state.editingId === elNode.id.replace('el-', '')) return; 

            if (e.target.closest('.properties-panel') || e.target.closest('.toolbar') || e.target.closest('.modal-content')) return;
            
            const rect = canvasEl.getBoundingClientRect();
            dragStartX = (e.clientX - rect.left) / state.zoom; 
            dragStartY = (e.clientY - rect.top) / state.zoom;

            clone.style.top = `${rect.top - canvasRect.top}px`;
            clone.style.position = 'absolute';
            clone.style.transform = 'none'; // Clear any existing transform
            clone.style.margin = '0';
            
            elementsToCapture.push(clone);
        }
    });

    const rawHtml = elementsToCapture.map(n => n.outerHTML).join('');
    
    const data = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${state.canvasW}" height="${state.canvasH}">
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml" style="width:${state.canvasW}px; height:${state.canvasH}px; background-color:${state.bgColor}; position:relative; overflow:hidden;">
                    ${rawHtml}
                </div>
            </foreignObject>
        </svg>
    `;
    
    // THE FIX: Use an encoded Data URI instead of a Blob ObjectURL.
    const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(data);
    
    const img = new Image();
    // Do not use crossOrigin="Anonymous" for Data URIs
    img.onerror = () => {
        console.error("Failed to load SVG data as an image.");
        alert("A browser error occurred during SVG rendering. Please ensure you are not using external images.");
    };
    img.onload = () => {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = state.canvasW * 2;
        tempCanvas.height = state.canvasH * 2;
        const ctx = tempCanvas.getContext('2d');
        ctx.scale(2, 2);
        
        ctx.fillStyle = state.bgColor === 'transparent' ? '#ffffff' : state.bgColor;
        ctx.fillRect(0, 0, state.canvasW, state.canvasH);
        
        ctx.drawImage(img, 0, 0);
        
        try {
            const a = document.createElement('a');
            const fileExt = format === 'jpeg' ? 'jpg' : format;
            a.download = `flyer_export.${fileExt}`;
            a.href = tempCanvas.toDataURL(`image/${format}`, 1.0);
            a.click();
        } catch (err) {
            console.error("Canvas export failed at toDataURL. You might have external images that aren't Base64.", err);
            alert("Export failed due to a strict CORS policy. Ensure all images used are uploaded directly from your computer.");
        }
        
        state.grid = currentGrid;
        renderCanvas();
    };
    img.src = url;
}

// --- UPDATED EXPORT TO PDF (Direct Download, fixes text positioning and CORS) ---
function exportToPDF() {
    if (!window.jspdf) {
        alert("The jsPDF library is missing. Please add it to your <head> to download PDFs directly.");
        return;
    }

    selectionOverlay.style.display = 'none';
    const currentGrid = state.grid;
    state.grid = false;
    renderCanvas();

    // Fix for Positioning: Convert all dynamic positioning to absolute pixel values
    const elementsToCapture = [];
    Array.from(canvasEl.childNodes).forEach(node => {
        if (node.id === 'selection-overlay') return;
        if (node.nodeType === 1) { 
            const clone = node.cloneNode(true);
            const rect = node.getBoundingClientRect();
            const canvasRect = canvasEl.getBoundingClientRect();
            
            clone.style.left = `${rect.left - canvasRect.left}px`;
            clone.style.top = `${rect.top - canvasRect.top}px`;
            clone.style.position = 'absolute';
            clone.style.transform = 'none';
            clone.style.margin = '0';
            
            elementsToCapture.push(clone);
        }
    });

    const rawHtml = elementsToCapture.map(n => n.outerHTML).join('');
                        
    const data = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${state.canvasW}" height="${state.canvasH}">
            <foreignObject width="100%" height="100%">
                <div xmlns="http://www.w3.org/1999/xhtml" style="width:${state.canvasW}px; height:${state.canvasH}px; background-color:${state.bgColor}; position:relative; overflow:hidden;">
                    ${rawHtml}
                </div>
            </foreignObject>
        </svg>
    `;
    
    // THE FIX: Use an encoded Data URI instead of a Blob ObjectURL.
    const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(data);
    
    const img = new Image();
    img.onerror = () => {
        console.error("Failed to load SVG data as an image for PDF.");
        alert("A browser error occurred during SVG rendering. Please ensure you are not using external images.");
    };
    img.onload = () => {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = state.canvasW * 2;
        tempCanvas.height = state.canvasH * 2;
        const ctx = tempCanvas.getContext('2d');
        ctx.scale(2, 2);
        
        ctx.fillStyle = state.bgColor === 'transparent' ? '#ffffff' : state.bgColor;
        ctx.fillRect(0, 0, state.canvasW, state.canvasH);
        ctx.drawImage(img, 0, 0);

        try {
            const imgData = tempCanvas.toDataURL('image/jpeg', 1.0);
            const { jsPDF } = window.jspdf;
            
            const orientation = state.canvasW > state.canvasH ? 'landscape' : 'portrait';
            const pdf = new jsPDF({
                orientation: orientation,
                unit: 'px',
                format: [state.canvasW, state.canvasH]
            });

            pdf.addImage(imgData, 'JPEG', 0, 0, state.canvasW, state.canvasH);
            pdf.save('flyer_export.pdf');
        } catch (err) {
            console.error("PDF export failed.", err);
            alert("Export failed due to a strict CORS policy. Ensure all images used are uploaded directly from your computer.");
        }

        state.grid = currentGrid;
        renderCanvas();
    };
    img.src = url;
}

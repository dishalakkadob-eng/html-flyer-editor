        // --- Replacement for parseHtmlIntoState ---

        async function parseHtmlIntoState(html) {
            const doc = new DOMParser().parseFromString(html, 'text/html');
            
            // Inject external styles and fonts
            doc.querySelectorAll('link[rel="stylesheet"], link[href*="font"]').forEach(link => {
                if (!document.querySelector(`link[href="${link.href}"]`)) {
                    const newLink = document.createElement('link');
                    newLink.rel = 'stylesheet';
                    newLink.href = link.href;
                    document.head.appendChild(newLink);
                }
            });

            doc.querySelectorAll('style').forEach(style => {
                const newStyle = document.createElement('style');
                newStyle.innerHTML = style.innerHTML;
                document.head.appendChild(newStyle);
            });

            // Hidden rendering container. We set it wide to allow for background layout
            const container = document.createElement('div'); 
            container.innerHTML = html; 
            container.style.cssText = 'position:absolute; top:0; left:0; width:1200px; height:1200px; opacity:0.001; pointer-events:none; margin:0; padding:0; z-index:-9999; overflow:hidden;';
            document.body.appendChild(container);

            const parsedRoot = container.firstElementChild;
            if (parsedRoot) parsedRoot.classList.add('flyer-parser-root');

            // Wait for external assets to paint so dimensions are accurate
            await document.fonts.ready; 
            await new Promise(r => setTimeout(r, 800)); // Short delay for images

            // Target the main canvas area
            let mainWrapper = container.querySelector('.canvas-container') || container.querySelector('.flyer-parser-root') || container;

            const rs = window.getComputedStyle(mainWrapper);
            state.canvasW = parseFloat(rs.width) || 816; 
            state.canvasH = parseFloat(rs.height) || 1056;
            if (rs.backgroundColor && rs.backgroundColor !== 'rgba(0, 0, 0, 0)') state.bgColor = rs.backgroundColor;
            
            state.elements = []; 
            // Reference rect for positions. (rect.top - rRect.top) is the final pixel coordinate
            const rRect = mainWrapper.getBoundingClientRect(); 
            
            // Helper to get z-index
            const getRealZIndex = (node) => {
                let el = node.nodeType === 3 ? node.parentNode : node;
                let z = 0;
                while (el && el !== document.body && el !== mainWrapper.parentElement) {
                    const zStr = window.getComputedStyle(el).zIndex;
                    if (zStr !== 'auto' && !isNaN(parseInt(zStr))) z = Math.max(z, parseInt(zStr));
                    el = el.parentElement;
                }
                return z;
            };

            // Helper to strip translation from transforms
            const stripTranslation = (transformStr) => {
                if (!transformStr || transformStr === 'none') return 'none';
                return transformStr.replace(/matrix\(([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*[^,]+,\s*[^)]+\)/, 'matrix($1, $2, $3, $4, 0, 0)');
            };
            
            // 4. RECURSIVE ELEMENT SCANNER
            function processNode(node) {
                if (node.nodeType !== 1) return; // Process elements only
                const tag = node.tagName.toLowerCase();
                if (tag === 'script' || tag === 'style') return;

                const st = window.getComputedStyle(node);
                const rect = node.getBoundingClientRect();

                // Detect icon wrappers like <div class="fa-wrap">
                const isIconWrap = node.classList.contains('fa-wrap') || node.querySelector('[class*="fa-"]') !== null || node.className.includes('fa-');
                
                // Skip entirely empty/invisible structural divs
                if (rect.width === 0 && rect.height === 0 && tag !== 'span' && !isIconWrap) return;

                const zIndex = getRealZIndex(node);
                const cleanTransform = stripTranslation(st.transform);
                let op = parseFloat(st.opacity); if (isNaN(op)) op = 1;

                // FIXED: Strictly Trust Viewport Coordinates.
                // The difference from rRect.top gives the final drawn pixel position.
                let elX = rect.left - rRect.left;
                let elY = rect.top - rRect.top;

                // --- PRESERVED CIRCULAR IMAGE FIX ---
                // We look for the '%' sign in the inline style first, before the browser converts it to pixels
                let elW = rect.width;
                let elH = rect.height;
                let radiusPx = 0;
                
                // Use a precise approach: check if any radius property has a '%'
                const radii = [node.style.borderRadius, node.style.borderTopLeftRadius, node.style.borderTopRightRadius];
                const percentValStr = radii.find(r => r && r.includes('%'));
                
                if (percentValStr) {
                    // For circles, the radius is half of the smaller dimension
                    const percentVal = parseFloat(percentValStr);
                    radiusPx = (percentVal / 100) * Math.min(elW, elH);
                } else {
                    // Otherwise trust computed pixels from the browser (148px etc.)
                    radiusPx = parseFloat(window.getComputedStyle(node).borderRadius) || 0;
                }

                // --- A. Handle Actual <img> Tags ---
                if (tag === 'img') {
                    state.elements.push({
                        id: crypto.randomUUID(), type: 'image', content: node.src,
                        x: elX, y: elY, w: elW, h: elH, angle: 0, opacity: op, zIndex: zIndex,
                        radius: radiusPx, objectFit: st.objectFit || 'fill',
                        filters: { b: 0, c: 0, s: 0, bl: 0 }, shadow: { c: '#000', bl: 0, x: 0, y: 0 }
                    });
                    return; // Img has no valid children, stop traversal here
                }
                if (isIconWrap || tag === 'svg' || tag === 'i') {
                    // 1. Try to find an actual SVG element
                    let actualSvg = tag === 'svg' ? node : node.querySelector('svg');
                    
                    // 2. DIMENSION FIX: If the icon hasn't loaded yet, it might report 0px. 
                    let finalW = rect.width > 0 ? rect.width : 25; 
                    let finalH = rect.height > 0 ? rect.height : 25;

                    if (actualSvg) {
                        // --- CASE A: IT IS A REAL SVG (Like the Clapperboard) ---
                        let computedColor = window.getComputedStyle(actualSvg).color;
                        if (!computedColor || computedColor === 'rgba(0, 0, 0, 0)') computedColor = '#333333';
                        
                        const hexColor = rgbToHex(computedColor).toUpperCase();
                        const cloneSvg = actualSvg.cloneNode(true);
                        
                        // 1. Force the XML namespace so DOMParser doesn't crash later during color editing
                        if (!cloneSvg.getAttribute('xmlns')) {
                            cloneSvg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
                        }

                        cloneSvg.setAttribute('width', '100%');
                        cloneSvg.setAttribute('height', '100%');
                        cloneSvg.style.display = 'block';
                        cloneSvg.style.visibility = 'visible';
                        cloneSvg.style.opacity = '1';

                        // 2. CRITICAL DRAG FIX: Wipe all inherited offsets so it stays perfectly under the drag-catcher
                        cloneSvg.style.setProperty('position', 'static', 'important');
                        cloneSvg.style.top = 'auto';
                        cloneSvg.style.left = 'auto';
                        cloneSvg.style.right = 'auto';
                        cloneSvg.style.bottom = 'auto';
                        cloneSvg.style.margin = '0';
                        cloneSvg.style.setProperty('transform', 'none', 'important'); 
                        cloneSvg.style.zIndex = 'auto'; 

                        cloneSvg.querySelectorAll('path, rect, circle, polygon').forEach(shape => {
                            shape.setAttribute('fill', hexColor);
                            shape.style.fill = hexColor;
                            shape.style.visibility = 'visible';
                        });

                        state.elements.push({ 
                            id: crypto.randomUUID(), type: 'svg', content: cloneSvg.outerHTML, originalContent: cloneSvg.outerHTML,
                            x: elX, y: elY, w: finalW, h: finalH, 
                            angle: 0, opacity: op, zIndex: zIndex, fill: hexColor, stroke: '', originalFill: hexColor 
                        });
                        return;
                    } else if (tag === 'i' || (node.className && typeof node.className === 'string' && (node.className.includes('fa-') || node.className.includes('icon')))) {
                        // --- CASE B: IT IS A FONT-ICON (Like <i class="fa fa-phone"></i>) ---
                        let computedColor = window.getComputedStyle(node).color;
                        if (!computedColor || computedColor === 'rgba(0, 0, 0, 0)') computedColor = '#333333';
                        const hexColor = rgbToHex(computedColor).toUpperCase();

                        const cloneIcon = node.cloneNode(true);
                        
                        // CRITICAL DRAG FIX: Prevent the wrapper from jumping above the drag catcher
                        cloneIcon.style.setProperty('position', 'static', 'important');
                        cloneIcon.style.top = 'auto';
                        cloneIcon.style.left = 'auto';
                        cloneIcon.style.right = 'auto';
                        cloneIcon.style.bottom = 'auto';
                        cloneIcon.style.margin = '0';
                        cloneIcon.style.display = 'block';
                        cloneIcon.style.width = '100%';
                        cloneIcon.style.height = '100%';
                        cloneIcon.style.setProperty('transform', 'none', 'important');
                        cloneIcon.style.zIndex = 'auto';

                        state.elements.push({ 
                            id: crypto.randomUUID(), type: 'svg', 
                            content: cloneIcon.outerHTML, originalContent: cloneIcon.outerHTML,
                            x: elX, y: elY, w: finalW, h: finalH, 
                            angle: 0, opacity: op, zIndex: zIndex, fill: hexColor, stroke: '' ,originalFill: hexColor 
                        });
                        return;
                    }
                }

                // --- C. Handle Leaf Text Blocks ---
                let isTextLeaf = false;
                const hasText = node.textContent.trim().length > 0;
                
                if (hasText) {
                    isTextLeaf = true;
                    for (let i = 0; i < node.children.length; i++) {
                        const ct = node.children[i].tagName.toLowerCase();
                        // Allow inline formatters or generic blocks that don't shift layout
                        if (!['br', 'span', 'i', 'b', 'strong', 'em', 'div', 'p'].includes(ct)) {
                            isTextLeaf = false; break;
                        }
                    }
                }

                if (isTextLeaf) {
                    let fSize = parseFloat(st.fontSize) || 16;
                    
                    // Correct Line Height Math
                    let lhRaw = st.lineHeight;
                    let lhMulti = 1.2;
                    if (lhRaw && lhRaw.endsWith('px')) lhMulti = parseFloat(lhRaw) / fSize;
                    else if (lhRaw && lhRaw !== 'normal' && !isNaN(parseFloat(lhRaw))) lhMulti = parseFloat(lhRaw);

                    state.elements.push({ 
                        id: crypto.randomUUID(), type: 'text', 
                        content: node.innerHTML.trim().replace(/\n/g, ''), 
                        x: elX, y: elY, w: elW, h: elH, 
                        angle: 0, opacity: op, zIndex: zIndex, 
                        fontSize: fSize, fontFamily: st.fontFamily, color: st.color, textTransform: st.textTransform || 'none',
                        bold: st.fontWeight === 'bold' || parseInt(st.fontWeight) >= 600, 
                        italic: st.fontStyle === 'italic', 
                        underline: st.textDecorationLine ? st.textDecorationLine.includes('underline') : false, 
                        textAlign: st.textAlign, lineHeight: Number(lhMulti.toFixed(2)), 
                        letterSpacing: parseFloat(st.letterSpacing) || 0, 
                        bgColor: st.backgroundColor === 'rgba(0, 0, 0, 0)' ? 'transparent' : st.backgroundColor, 
                        radius: radiusPx, textShadow: st.textShadow !== 'none' ? st.textShadow : 'none', 
                        transformMatrix: cleanTransform 
                    });
                    return; // Successfully absorbed into a text block, stop traversal
                }

                // --- D. Handle Background Images & Shapes ---
                const bgImg = st.backgroundImage;
                const hasColorBg = st.backgroundColor !== 'rgba(0, 0, 0, 0)' && st.backgroundColor !== 'transparent';
                const hasBorder = st.borderWidth !== '0px' && st.borderStyle !== 'none';

                if (bgImg && bgImg.includes('url(') && node !== mainWrapper) {
                    const m = bgImg.match(/url\(['"]?(.*?)['"]?\)/);
                    if (m && m[1]) {
                        state.elements.push({ 
                            id: crypto.randomUUID(), type: 'image', content: m[1], 
                            x: elX, y: elY, w: elW, h: elH, angle: 0, opacity: op, zIndex: zIndex, 
                            radius: radiusPx, objectFit: st.objectFit || 'fill',
                            filters: { b: 0, c: 0, s: 0, bl: 0 }, shadow: { c: '#000', bl: 0, x: 0, y: 0 } 
                        });
                    }
                } else if ((bgImg.includes('gradient') || hasColorBg || hasBorder) && node !== mainWrapper) {
                    state.elements.push({
                        id: crypto.randomUUID(), type: 'shape',
                        x: elX, y: elY, w: elW, h: elH, angle: 0, opacity: op, zIndex: zIndex,
                        bgColor: st.backgroundColor, bgImage: bgImg.includes('gradient') ? bgImg : 'none',
                        border: hasBorder ? `${st.borderWidth} ${st.borderStyle} ${st.borderColor}` : 'none',
                        radius: radiusPx, backdropFilter: st.backdropFilter !== 'none' ? st.backdropFilter : 'none',
                        transformMatrix: cleanTransform 
                    });
                }

                // 5. CONTINUE RECURSIVELY DOWN THE TREE
                for (let i = 0; i < node.children.length; i++) {
                    processNode(node.children[i]);
                }
            }

            // Start parsing from children of the mainWrapper
            for (let i = 0; i < mainWrapper.children.length; i++) {
                processNode(mainWrapper.children[i]);
            }
            
            // Sort and reset z-indices
            state.elements.sort((a, b) => a.zIndex - b.zIndex);
            state.elements.forEach((el, index) => el.zIndex = index);

            document.body.removeChild(container); 
            
            // Update editor state
            state.history = []; state.historyIdx = -1; saveHistory(); fitToScreen(); renderCanvas();
        }   
       
        // SVG Raw Edit
        function applyRawSvg() { const el = getSelectedElement(); if (el) { el.content = DOMSanitizer.sanitize(document.getElementById('svg-raw-input').value); renderCanvas(); saveHistory(); hideModal('modal-svg'); } }

        // Utils
        function toggleGrid() { state.grid = !state.grid; document.getElementById('btn-grid').classList.toggle('active', state.grid); renderCanvas(); }
        function zoomIn() { state.zoom = Math.min(5, state.zoom + 0.2); d_scale.style.transform = `scale(${state.zoom})`; document.getElementById('zoom-text').innerText = Math.round(state.zoom * 100) + '%'; }
        function zoomOut() { state.zoom = Math.max(0.2, state.zoom - 0.2); d_scale.style.transform = `scale(${state.zoom})`; document.getElementById('zoom-text').innerText = Math.round(state.zoom * 100) + '%'; }

   

        function showLoading(text = "PROCESSING EXPORT...") {
            const loader = document.getElementById('export-loader');

            loader.style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('export-loader').style.display = 'none';

        // --- 1. ROBUST IMAGE-TO-BASE64 CONVERTER ---
        async function fetchImageAsBase64(url) {
            if (!url || url.startsWith('data:')) return url;
            try {
                // public proxy to bypass CORS
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('CORS proxy failed');
                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                console.warn("Proxy failed for:", url, e);
                return url; // Fallback to original
            }
        }

        // --- 2. FIXED EXPORT FUNCTION ---
        async function exportToImage(format) {
            // A. Show a simple alert so the user knows it's working (it takes a few seconds)
            console.log("Starting export...");
            showLoading(`GENERATING ${format.toUpperCase()}...`);
            
            // B. Create a temporary "Clean Clone" of the flyer
            const clone = canvasEl.cloneNode(true);
            
            // C. REMOVE UI: Find and delete the handles/overlays inside the clone
            const overlay = clone.querySelector('#selection-overlay');
            if (overlay) overlay.remove();


        // --- SMART TEXT WRAP FIX FOR HTML2CANVAS ---
            const canvasCtx = document.createElement('canvas').getContext('2d');
            const textElements = clone.querySelectorAll('.canvas-element');
            
            textElements.forEach(el => {
                const stateEl = state.elements.find(e => 'el-' + e.id === el.id);
                if (stateEl && stateEl.type === 'text') {
                    const originalNode = document.getElementById(el.id);
                    if (!originalNode) return;

                    const computedStyle = window.getComputedStyle(originalNode);
                    const currentWidth = parseFloat(el.style.width);
                    const fontSize = parseFloat(computedStyle.fontSize);
                    const lineHeight = parseFloat(computedStyle.lineHeight) || (fontSize * 1.2);
                    
                    // 1. Wrap Strategy Detection
                    // Tighter threshold: A box must be practically 1-character wide to be vertical
                    const isVertical = currentWidth <= (fontSize * 1.8); 
                    // Relaxed threshold: Allows custom fonts with large padding to stay single-line
                    const isSingleLine = originalNode.scrollHeight <= (lineHeight * 1.5);

                    // 2. DYNAMIC BUFFER
                    // Horizontal text gets 8px to guarantee html2canvas never prematurely wraps words
                    const buffer = isVertical ? 0 : 1;
                    
                    el.style.lineHeight = computedStyle.lineHeight;
                    el.style.width = (currentWidth + buffer) + 'px';
                    el.style.minWidth = (currentWidth + buffer) + 'px';
                    el.style.maxWidth = (currentWidth + buffer) + 'px';

                    if (computedStyle.textAlign === 'center') {
                        el.style.left = (parseFloat(el.style.left) - (buffer / 2)) + 'px';
                    } else if (computedStyle.textAlign === 'right') {
                        el.style.left = (parseFloat(el.style.left) - buffer) + 'px';
                    }

                    if (isSingleLine && !isVertical) {
                        // FIX: Lock Single Line text so it is physically impossible to wrap
                        el.style.whiteSpace = 'nowrap';
                        el.style.wordBreak = 'keep-all';
                        el.style.overflowWrap = 'normal'; 
                    } else {
                        // Multi-line & Vertical Stacked Text
                        el.style.whiteSpace = 'pre-wrap';
                        el.style.wordBreak = 'break-word';
                        el.style.overflowWrap = 'break-word'; 
                        
                        // Strip hidden leading newlines
                        el.innerHTML = el.innerHTML.replace(/^[\s\r\n]+/, '');

                        // 3. SEPARATED LOGIC: Smart Zero-Width Space Injector
                        canvasCtx.font = `${computedStyle.fontStyle} ${computedStyle.fontWeight} ${computedStyle.fontSize} ${computedStyle.fontFamily}`;
                        let letterSpacing = parseFloat(computedStyle.letterSpacing) || 0;
                        
                        const injectSmartZWS = (node) => {
                            Array.from(node.childNodes).forEach(child => {
                                if (child.nodeType === 3 && child.nodeValue) {
                                    const parts = child.nodeValue.split(/(\s+)/);
                                    let modified = false;

                                    const newParts = parts.map(part => {
                                        if (part.match(/^\s+$/)) return part;

                                        let measureText = part;
                                        if (stateEl.textTransform === 'uppercase') measureText = measureText.toUpperCase();
                                        if (stateEl.textTransform === 'lowercase') measureText = measureText.toLowerCase();

                                        const w = canvasCtx.measureText(measureText).width + (measureText.length * letterSpacing);
                                        
                                        if (isVertical) {
                                            // Aggressive wrapping for vertical columns
                                            if (w > currentWidth - 1) { 
                                                modified = true;
                                                return part.split('').join('\u200B');
                                            }
                                        } else {
                                            // SAFEGUARD: Only break massive strings (>10 chars) in horizontal text.
                                            // Standard words ("HIRING", "SUNDAY") completely bypass the measurement 
                                            // hack, preventing them from being corrupted!
                                            if (part.length > 1 && w > (currentWidth + buffer)) {
                                                modified = true;
                                                return part.split('').join('\u200B');
                                            }
                                        }
                                        return part; 
                                    });

                                    if (modified) {
                                        child.nodeValue = newParts.join('');
                                    }
                                } else if (child.nodeType === 1) { 
                                    injectSmartZWS(child);
                                }
                            });
                        };
                        injectSmartZWS(el);
                    }
                }
            });
            // --- END SMART TEXT FIX ---
            

            
            
            // D. REMOVE GRID: Ensure the clone has no background grid
            clone.style.backgroundImage = 'none';
            clone.style.backgroundColor = state.bgColor;
            
            // E. Fix Dimensions: Force the clone to be exactly the template size
            clone.style.width = state.canvasW + 'px';
            clone.style.height = state.canvasH + 'px';
            clone.style.position = 'absolute';
            clone.style.top = '-10000px'; // Hide it from the user's view
            clone.style.left = '-10000px';
            clone.style.transform = 'none'; // Reset any scaling
            document.body.appendChild(clone);

            // F. SWAP S3 IMAGES: Check both <img> tags and background-images
            const allImgs = clone.querySelectorAll('img');
            for (let img of allImgs) {
                if (img.src.includes('amazonaws.com')) {
                    img.src = await fetchImageAsBase64(img.src);
                }
            }
            
            const allShapes = clone.querySelectorAll('.canvas-element');
            for (let shape of allShapes) {
                const bg = shape.style.backgroundImage;
                if (bg && bg.includes('amazonaws.com')) {
                    const urlMatch = bg.match(/url\(["']?(.*?)["']?\)/);
                    if (urlMatch && urlMatch[1]) {
                        const b64 = await fetchImageAsBase64(urlMatch[1]);
                        shape.style.backgroundImage = `url("${b64}")`;
                    }
                }
            }

            try {
                // G. Wait for fonts to be ready so text doesn't move
                await document.fonts.ready;
                await new Promise(r => setTimeout(r, 300)); // Hard delay for repainting

                const capture = await html2canvas(clone, {
                    scale: 2, 
                    useCORS: true,
                    allowTaint: false,
                    letterRendering:true,
                    backgroundColor: (state.bgColor === 'transparent' || !state.bgColor) ? '#ffffff' : state.bgColor,
                    width: state.canvasW,
                    height: state.canvasH,
                    scrollX: 0,
                    scrollY: 0,
                    logging: false
                });

                const mimeType = format === 'jpeg' ? 'image/jpeg' : 'image/png';
                const fileExt = format === 'jpeg' ? 'jpg' : 'png';
                
                const a = document.createElement('a');
                a.download = `flyer_export.${fileExt}`;
                a.href = capture.toDataURL(mimeType, 1.0);
                a.click();

            } catch (err) {
                console.error("Export Error:", err);
                alert("Export failed. Check console for details.");
            } finally {
                // H. Cleanup the invisible clone
                document.body.removeChild(clone);
                hideLoading(); // Always hide spinner, even on error
            }
        }

                        canvasCtx.font = `${computedStyle.fontStyle} ${computedStyle.fontWeight} ${computedStyle.fontSize} ${computedStyle.fontFamily}`;
                        let letterSpacing = parseFloat(computedStyle.letterSpacing) || 0;
                        
                        const injectSmartZWS = (node) => {

                                            if (part.length > 1 && w > (currentWidth + buffer)) {

                                        return part; 
                                    });

                                    if (modified) {
                                        child.nodeValue = newParts.join('');

                                } else if (child.nodeType === 1) { 
                                    injectSmartZWS(child);
                                }
                            });
                        };
                        injectSmartZWS(el);

                }
            });
            // --- END SMART TEXT FIX --- 

            clone.style.backgroundImage = 'none';
